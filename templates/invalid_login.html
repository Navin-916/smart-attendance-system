<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Failed</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #0A0A0A,
        #111111
    );

    color:white;
}

.card{

    width:420px;

    background:#151515;

    border-radius:28px;

    padding:45px;

    text-align:center;

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
    0 20px 60px rgba(0,0,0,0.45);

    animation:fadeIn 0.4s ease;
}

.icon{

    font-size:70px;

    margin-bottom:20px;
}

h1{

    color:#EF4444;

    margin-bottom:12px;

    font-size:34px;
}

p{

    color:#94A3B8;

    line-height:1.6;

    margin-bottom:30px;
}

.btn{

    display:inline-block;

    padding:14px 28px;

    border-radius:14px;

    text-decoration:none;

    font-weight:600;

    color:white;

    background:
    linear-gradient(
        135deg,
        #059669,
        #10B981
    );

    transition:0.3s;
}

.btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(16,185,129,0.25);
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.footer{

    margin-top:25px;

    color:#6B7280;

    font-size:13px;
}

</style>
</head>

<body>

<div class="card">

    <div class="icon">🔒</div>

    <h1>Access Denied</h1>

    <p>
        The username or password you entered is incorrect.
        Please verify your credentials and try again.
    </p>

    <a href="/login" class="btn">
        Back to Login
    </a>

    <div class="footer">
        Smart Attendance System
    </div>

</div>

</body>
</html>
