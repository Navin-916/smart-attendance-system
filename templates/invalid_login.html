<!DOCTYPE html>
<html>
<head>
<title>Login Failed</title>

<style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #0A0A0A,
        #111111
    );

    font-family:Arial,sans-serif;
}

.card{

    width:400px;

    background:#151515;

    border-radius:24px;

    padding:40px;

    text-align:center;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.4);
}

h1{

    color:#EF4444;

    margin-bottom:15px;
}

p{

    color:#94A3B8;

    margin-bottom:25px;
}

a{

    display:inline-block;

    padding:14px 22px;

    text-decoration:none;

    color:white;

    font-weight:600;

    border-radius:12px;

    background:
    linear-gradient(
        135deg,
        #059669,
        #10B981
    );
}

</style>
</head>

<body>

<div class="card">

    <h1>❌ Invalid Login</h1>

    <p>
        Incorrect username or password.
    </p>

    <a href="/login">
        Try Again
    </a>

</div>

</body>
</html>
