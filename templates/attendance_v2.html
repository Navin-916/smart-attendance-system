<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>

```
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #111827;
        color: white;
        padding: 20px;
    }

    .header {
        text-align: center;
        margin-bottom: 25px;
    }

    .header h1 {
        color: #60A5FA;
    }

    .stats {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .card {
        flex: 1;
        min-width: 150px;
        background: #1F2937;
        padding: 15px;
        border-radius: 12px;
        text-align: center;
    }

    .card h2 {
        color: #60A5FA;
    }

    .search-box {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        margin-bottom: 20px;
        font-size: 16px;
    }

    .student-container {
        display: grid;
        gap: 12px;
    }

    .student-card {
        background: #1F2937;
        border-radius: 12px;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .present-card {
    border-left: 6px solid #10B981;
    }

    .absent-card {
    border-left: 6px solid #EF4444;
    background: #2B1111;
    }

    .student-info h3 {
        margin-bottom: 5px;
    }

    .student-info p {
        color: #9CA3AF;
    }

    .toggle-btn {
        background: #10B981;
        border: none;
        color: white;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
    }

    .toggle-btn.absent {
        background: #EF4444;
    }

    .save-btn {
        width: 100%;
        margin-top: 25px;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: #2563EB;
        color: white;
        font-size: 18px;
        cursor: pointer;
    }
    .present-card {
    border-left: 6px solid #10B981;
    }

    .absent-card {
    border-left: 6px solid #EF4444;
    background: #2B1111;
    }
</style>
```

</head>

<body>

```
<div class="header">
    <h1>Smart Attendance System</h1>
    <p>AI & DS Attendance Dashboard</p>
</div>

<div class="stats">
    <div class="card">
        <h2 id="totalCount">{{ students|length }}</h2>
        <p>Total Students</p>
    </div>

    <div class="card">
        <h2 id="presentCount">{{ students|length }}</h2>
        <p>Present</p>
    </div>

    <div class="card">
        <h2 id="absentCount">0</h2>
        <p>Absent</p>
    </div>
</div>
<div class="card" style="margin-bottom:20px;">

    <h2>Absent Students</h2>

    <ul id="absentList">

    </ul>

</div>

<input
    type="text"
    id="searchBox"
    class="search-box"
    placeholder="Search student..."
    onkeyup="searchStudents()"
>

<form method="POST" action="/save-attendance">

    <div class="student-container" id="studentContainer">

        {% for id, roll_no, name in students %}

        <div class="student-card present-card">

            <div class="student-info">
                <h3>{{ name }}</h3>
                <p>{{ roll_no }}</p>
            </div>

            <div>
                <input
                    type="checkbox"
                    checked
                    name="present"
                    value="{{ id }}"
                    data-name="{{ name }}"
                    onchange="updateCounts(); updateCard(this);"
                >
            </div>

        </div>

        {% endfor %}

    </div>

    <button class="save-btn" type="submit">
        Save Attendance
    </button>

</form>
```

<script>

function updateCounts() {

    const checkboxes =
    document.querySelectorAll('input[name="present"]');

    let present = 0;
    let absent = 0;

    const absentList =
    document.getElementById("absentList");

    absentList.innerHTML = "";

    checkboxes.forEach(cb => {

        if(cb.checked){

            present++;

        }
        else{

            absent++;

            const li =
            document.createElement("li");

            li.innerText =
            cb.dataset.name;

            absentList.appendChild(li);
        }
    });

    document.getElementById("presentCount")
    .innerText = present;

    document.getElementById("absentCount")
    .innerText = absent;
}

function updateCard(checkbox) {

    const card =
    checkbox.closest(".student-card");

    if (checkbox.checked) {

        card.classList.remove("absent-card");
        card.classList.add("present-card");

    } else {

        card.classList.remove("present-card");
        card.classList.add("absent-card");
    }
}

function searchStudents() {

    let input =
    document.getElementById("searchBox")
    .value
    .toLowerCase();

    let cards =
    document.querySelectorAll(".student-card");

    cards.forEach(card => {

        let text =
        card.innerText.toLowerCase();

        if(text.includes(input)){
            card.style.display = "flex";
        }
        else{
            card.style.display = "none";
        }
    });
}
updateCounts();

document
.querySelectorAll('input[name="present"]')
.forEach(cb => updateCard(cb));
</script>

</body>
</html>
