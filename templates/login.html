<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{

    background:
    linear-gradient(
        135deg,
        #0A0A0A,
        #111111
    );

    color:white;

    font-family:Arial,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    position:relative;
    overflow:hidden;
}
body::before{

    content:"";

    position:fixed;

    inset:0;

    background:

    linear-gradient(
        rgba(255,255,255,0.015) 1px,
        transparent 1px
    ),

    linear-gradient(
        90deg,
        rgba(255,255,255,0.015) 1px,
        transparent 1px
    );

    background-size:40px 40px;

    z-index:-2;
}

.card{

    width:430px;

    background:
    rgba(21,21,21,0.82);

    backdrop-filter:blur(16px);

    -webkit-backdrop-filter:blur(16px);

    padding:45px;

    border-radius:24px;

    border:1px solid rgba(255,255,255,0.05);

    box-shadow:
    0 10px 35px rgba(0,0,0,0.35);

    text-align:center;
    transition:0.3s ease;
}
.card:hover{

    transform:translateY(-4px);

    box-shadow:
    0 20px 50px rgba(0,0,0,0.45);
}
.logo{

    width:120px;

    height:70px;

    margin:0 auto 20px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #10B981,
        #059669
    );

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:26px;

    font-weight:800;

    color:white;

    box-shadow:
    0 10px 25px rgba(16,185,129,0.25);
}
h2{

    font-size:34px;

    font-weight:700;

    color:white;

    margin-bottom:8px;

    letter-spacing:-0.5px;
}

.tagline{

    color:#94A3B8;

    font-size:14px;

    margin-bottom:30px;
}
input{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:none;

    border-radius:12px;

    background:#0F0F0F;

    color:white;

    font-size:15px;
}

input:focus{

    outline:none;

    box-shadow:
    0 0 15px rgba(16,185,129,0.25);
}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:
    linear-gradient(
        135deg,
        #059669,
        #10B981
    );

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(16,185,129,0.25);
}
.orb{

    position:fixed;

    border-radius:50%;

    filter:blur(120px);

    z-index:-1;
}

.orb1{

    width:500px;
    height:500px;

    background:#10B981;

    top:-150px;
    left:-150px;

    opacity:0.22;
}

.orb2{

    width:550px;
    height:550px;

    background:#3B82F6;

    bottom:-200px;
    right:-200px;

    opacity:0.15;
}


</style>

</head>

<body>

<div class="orb orb1"></div>

<div class="orb orb2"></div>

<div class="card">

<div class="logo">

    AI&DS

</div>

<h2>

    Smart Attendance

</h2>
<p class="tagline">
    Attendance Management Platform
</p>

<form method="POST">

<input
    type="text"
    name="username"
    placeholder="Username"
    required
>

<input
    type="password"
    name="password"
    placeholder="Password"
    required
>

<button type="submit">
    Login
</button>

</form>

</div>

</body>
</html>
