
<!DOCTYPE html>
<html>
<head>

<title>Attendance History</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:
    linear-gradient(
        135deg,
        #0A0A0A,
        #111111
    );

    color:white;

    padding:30px;
}

.header{

    text-align:center;

    margin-bottom:30px;
}

.header h1{

    color:#10B981;

    font-size:40px;
}

.history-grid{

    max-width:900px;

    margin:auto;
}

.card{

    background:#151515;

    padding:25px;

    border-radius:20px;

    border:1px solid rgba(255,255,255,0.05);

    transition:0.3s;
}

.card:hover{

    transform:translateY(-4px);

    border-color:
    rgba(16,185,129,0.3);
}

.date{

    color:#10B981;

    font-size:22px;

    margin-bottom:15px;
}

.card p{

    margin-bottom:10px;
}

.view-btn{

    display:block;

    text-align:center;

    padding:12px;

    border-radius:12px;

    text-decoration:none;

    color:white;

    background:
    linear-gradient(
        135deg,
        #059669,
        #10B981
    );
}

.back-btn{

    display:block;

    width:250px;

    margin:auto;

    text-align:center;

    padding:15px;

    border-radius:15px;

    background:#151515;

    color:white;

    text-decoration:none;
}

</style>

</head>

<body>

<div class="header">

    <h1>📚 Attendance History</h1>

</div>

<div class="history-grid">

{% for date, present, od, absent in history_data %}

<div class="card">

    <div class="date">
        {{ date }}
    </div>

    <p>✅ Present : {{ present }}</p>

    <p>🏢 OD : {{ od }}</p>

    <p>❌ Absent : {{ absent }}</p>

    <br>

    <a
        class="view-btn"
        href="/report/{{ section }}/{{ date }}"
    >
        View Report
    </a>

</div>

{% endfor %}

</div>

<br>

<a
    href="/section/{{ section }}"
    class="back-btn"
>
    Back to Attendance
</a>

</body>
</html>
